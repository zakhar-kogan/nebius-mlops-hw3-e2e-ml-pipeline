services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.18.0
    container_name: mlops-assignment-mlflow
    command:
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --backend-store-uri
      - sqlite:////mlflow/mlflow.db
      - --default-artifact-root
      - /mlflow/artifacts
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    volumes:
      - ./mlflow-compose-artifacts:/mlflow
    environment:
      MLFLOW_HOST: 0.0.0.0
